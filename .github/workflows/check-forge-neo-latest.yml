name: Rebuild on Forge Neo latest tag changes

on:
  schedule:
    - cron: "20 0 * * *"
  workflow_dispatch:

jobs:
  get-forge-neo-latest-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.fetch.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Get latest numeric tag
        id: fetch
        run: |
          tag=$(bash .github/scripts/resolve-forge-neo-latest-tag.sh)
          echo "Latest Forge Neo tag: $tag"
          printf 'tag=%s\n' "$tag" >>"$GITHUB_OUTPUT"

  check-forge-neo-latest:
    needs: get-forge-neo-latest-tag
    uses: ./.github/workflows/check-forge-neo.yml
    with:
      forge_neo_ref: "${{ needs.get-forge-neo-latest-tag.outputs.tag }}"
      image_label: "latest"
      extra_image_label: "${{ needs.get-forge-neo-latest-tag.outputs.tag }}"
    permissions:
      contents: read
      packages: write
    secrets: inherit

