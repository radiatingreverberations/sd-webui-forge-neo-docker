name: "Docker Bake Build"
description: "Reusable composite action to build and optionally push Docker Bake targets with standardized labeling."
inputs:
  forge_neo_ref:
    description: "Forge Neo branch or tag reference"
    required: true
  image_label:
    description: "Image label, such as latest or neo"
    required: true
  targets:
    description: "Comma or newline separated list of Bake targets to build"
    required: true
  push:
    description: "Whether to push"
    required: false
    default: "true"
  registry:
    description: "Container registry host"
    required: true
    default: "ghcr.io"
  docker_registry_url:
    description: "Full registry URL prefix including trailing slash"
    required: true
  extra_set:
    description: "Additional Bake set lines"
    required: false
    default: ""
  registry_token:
    description: "Token/password for authenticating to the container registry"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Pre-create BuildKit volume on /mnt
      shell: bash
      run: |
        sudo mkdir -p /mnt/buildkit-state
        sudo docker volume create \
          --driver local \
          --opt type=none \
          --opt device=/mnt/buildkit-state \
          --opt o=bind \
          buildx_buildkit_ci0_state

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
      with:
        name: ci

    - name: Log in to registry
      if: ${{ inputs.registry_token != '' }}
      uses: docker/login-action@v4
      with:
        registry: ${{ inputs.registry }}
        username: ${{ github.actor }}
        password: ${{ inputs.registry_token }}

    - name: Fetch Forge Neo commit SHA
      id: forge_neo_ref
      shell: bash
      run: |
        sha=$(bash "${{ github.action_path }}/../../scripts/resolve-forge-neo-sha.sh" "${{ inputs.forge_neo_ref }}")
        printf 'sha=%s\n' "$sha" >>"$GITHUB_OUTPUT"

    - name: Normalize targets list
      id: targets
      shell: bash
      run: |
        echo "input targets: ${{ inputs.targets }}"
        echo "list<<EOF" >>"$GITHUB_OUTPUT"
        echo "${{ inputs.targets }}" | tr ',' '\n' | sed '/^\s*$/d' >>"$GITHUB_OUTPUT"
        echo "EOF" >>"$GITHUB_OUTPUT"

    - name: Build
      uses: docker/bake-action@v7
      with:
        push: ${{ inputs.push == 'true' }}
        set: |
          *.args.REFRESH_FORGE_NEO=${{ steps.forge_neo_ref.outputs.sha }}
          *.labels.forge-neo.ref=${{ inputs.forge_neo_ref }}
          *.labels.forge-neo.sha=${{ steps.forge_neo_ref.outputs.sha }}
          ${{ inputs.extra_set }}
        targets: ${{ steps.targets.outputs.list }}
